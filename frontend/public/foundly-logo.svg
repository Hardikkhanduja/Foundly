<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 130" width="120" height="130">
  <defs>
    <linearGradient id="tagGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b6b"/>
      <stop offset="100%" style="stop-color:#ee5a24"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d3436"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#00000055"/>
    </filter>
  </defs>

  <!-- Dark rounded background -->
  <rect x="2" y="2" width="116" height="126" rx="22" ry="22" fill="url(#bgGrad)" filter="url(#shadow)"/>

  <!-- String / loop at top -->
  <circle cx="60" cy="22" r="7" fill="none" stroke="#fdcb6e" stroke-width="3"/>
  <line x1="60" y1="29" x2="60" y2="36" stroke="#fdcb6e" stroke-width="3" stroke-linecap="round"/>

  <!-- Tag body -->
  <rect x="22" y="36" width="76" height="72" rx="10" ry="10" fill="url(#tagGrad)"/>

  <!-- Notch at top of tag -->
  <rect x="48" y="34" width="24" height="8" rx="4" ry="4" fill="url(#bgGrad)"/>

  <!-- "?" icon — lost item symbol -->
  <text x="60" y="88" font-family="Georgia, serif" font-size="44" font-weight="bold"
        fill="white" text-anchor="middle" opacity="0.95">?</text>

  <!-- Small dot under question mark -->
  <circle cx="60" cy="98" r="4" fill="white" opacity="0.7"/>
</svg>
