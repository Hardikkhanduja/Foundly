<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <defs>
    <linearGradient id="pinGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1d4ed8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Pin body -->
  <path d="M50 8 C34 8 22 20 22 35 C22 54 50 88 50 88 C50 88 78 54 78 35 C78 20 66 8 50 8Z"
        fill="url(#pinGrad)" filter="url(#glow)"/>

  <!-- Inner circle -->
  <circle cx="50" cy="35" r="13" fill="rgba(255,255,255,0.15)" stroke="white" stroke-width="2.5"/>

  <!-- Search dot -->
  <circle cx="47" cy="32" r="5" fill="none" stroke="white" stroke-width="2.5"/>
  <line x1="51" y1="36" x2="55" y2="40" stroke="white" stroke-width="2.5" stroke-linecap="round"/>
</svg>
